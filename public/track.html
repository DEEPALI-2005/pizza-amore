<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order — The Pizza Amore</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0a06;--surface:#161209;--card:#1c1710;
  --accent:#ff6b2b;--gold:#f0a500;--gold2:#ffc842;
  --cream:#fdf4e3;--green:#2d9e6b;--red:#e63946;
  --muted:#6b5f46;--muted2:#8a7a5c;--text:#ede3d0;--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}

header{padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(13,10,6,.94);border-bottom:1px solid rgba(255,107,43,.1);position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--gold));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-name{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;color:var(--cream);}
.back-home{background:rgba(255,107,43,.12);border:1px solid rgba(255,107,43,.25);color:var(--accent);padding:8px 16px;border-radius:50px;text-decoration:none;font-size:.82rem;font-weight:600;}

.wrap{max-width:580px;margin:0 auto;padding:48px 20px;}

.page-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:var(--cream);margin-bottom:6px;letter-spacing:-.03em;}
.page-sub{color:var(--muted2);font-size:.9rem;margin-bottom:32px;}

/* SEARCH BOX */
.search-box{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px;margin-bottom:28px;}
.search-label{font-size:.75rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block;}
.search-row{display:flex;gap:10px;}
.order-input{flex:1;background:var(--card);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;letter-spacing:1px;text-transform:uppercase;}
.order-input:focus{border-color:var(--accent);}
.order-input::placeholder{color:var(--muted);text-transform:none;letter-spacing:0;}
.track-btn{background:linear-gradient(135deg,var(--accent),#ff8c42);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.track-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,107,43,.4);}
.track-btn:disabled{background:#333;cursor:not-allowed;transform:none;box-shadow:none;}

/* RESULT */
.result{display:none;}
.result.show{display:block;}

.order-card{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:20px;overflow:hidden;margin-bottom:20px;}
.order-card-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;}
.order-id-label{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.order-id-val{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:var(--gold);}
.status-pill{padding:6px 14px;border-radius:50px;font-size:.78rem;font-weight:700;}
.s-pending{background:rgba(255,167,38,.15);color:#ffa726;border:1px solid rgba(255,167,38,.3);}
.s-confirmed{background:rgba(66,165,245,.15);color:#42a5f5;border:1px solid rgba(66,165,245,.3);}
.s-preparing{background:rgba(171,71,188,.15);color:#ab47bc;border:1px solid rgba(171,71,188,.3);}
.s-out_for_delivery{background:rgba(255,107,43,.15);color:var(--accent);border:1px solid rgba(255,107,43,.3);}
.s-delivered{background:rgba(45,158,107,.15);color:#3dbb80;border:1px solid rgba(45,158,107,.3);}
.s-cancelled{background:rgba(230,57,70,.15);color:#ef5350;border:1px solid rgba(230,57,70,.3);}

/* PROGRESS STEPS */
.progress-wrap{padding:28px 24px;}
.progress-title{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;}
.steps{position:relative;}
.steps::before{content:'';position:absolute;left:18px;top:18px;bottom:18px;width:2px;background:rgba(255,255,255,.07);}
.step{display:flex;gap:16px;align-items:flex-start;margin-bottom:24px;position:relative;}
.step:last-child{margin-bottom:0;}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;z-index:1;border:2px solid rgba(255,255,255,.1);background:var(--card);}
.step.done .step-dot{background:linear-gradient(135deg,var(--green),#3dbb80);border-color:transparent;}
.step.active .step-dot{background:linear-gradient(135deg,var(--accent),#ff8c42);border-color:transparent;box-shadow:0 0 20px rgba(255,107,43,.4);}
.step.cancelled .step-dot{background:rgba(230,57,70,.2);border-color:rgba(230,57,70,.4);}
.step-info{}
.step-name{font-weight:600;font-size:.92rem;color:var(--text);}
.step.done .step-name{color:var(--green);}
.step.active .step-name{color:var(--accent);}
.step.inactive .step-name{color:var(--muted);}
.step-desc{font-size:.78rem;color:var(--muted);margin-top:3px;}
.step.active .step-desc{color:var(--muted2);}

/* ORDER DETAILS */
.order-details{padding:0 24px 24px;}
.detail-section{background:var(--card);border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,.05);}
.detail-title{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.detail-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.86rem;border-bottom:1px solid rgba(255,255,255,.04);}
.detail-row:last-child{border-bottom:none;}
.detail-key{color:var(--muted2);}
.detail-val{color:var(--cream);font-weight:500;text-align:right;max-width:60%;}
.total-row{display:flex;justify-content:space-between;padding:10px 0 0;font-weight:700;font-size:.94rem;border-top:1px solid rgba(255,255,255,.07);margin-top:8px;}
.total-val{color:var(--gold);}

.items-list{margin-top:4px;}
.item-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.83rem;}
.item-name{color:var(--text);}
.item-price{color:var(--gold);}

/* ETA BOX */
.eta-box{background:linear-gradient(135deg,rgba(255,107,43,.12),rgba(240,165,0,.08));border:1px solid rgba(255,107,43,.2);border-radius:14px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.eta-icon{font-size:2rem;}
.eta-text{}
.eta-label{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;}
.eta-val{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;color:var(--gold2);margin-top:2px;}

/* HELP */
.help-box{background:var(--card);border-radius:14px;padding:16px 20px;text-align:center;border:1px solid rgba(255,255,255,.05);}
.help-box p{color:var(--muted2);font-size:.84rem;margin-bottom:8px;}
.help-box a{color:var(--accent);font-weight:600;text-decoration:none;}

/* ERROR */
.error-box{background:rgba(230,57,70,.08);border:1px solid rgba(230,57,70,.2);border-radius:14px;padding:20px;text-align:center;color:#ef5350;font-size:.9rem;}

/* SPINNER */
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">🍕</div>
    <div class="logo-name">The Pizza Amore</div>
  </a>
  <a class="back-home" href="/">← Menu</a>
</header>

<div class="wrap">
  <h1 class="page-title">Track Your Order</h1>
  <p class="page-sub">Apna Order ID daalo aur status dekho 🍕</p>

  <div class="search-box">
    <label class="search-label">Order ID</label>
    <div class="search-row">
      <input class="order-input" id="orderInput" type="text" placeholder="e.g. PA971143" maxlength="10">
      <button class="track-btn" id="trackBtn" onclick="trackOrder()">Track →</button>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
const STEPS = [
  { key:'pending',          icon:'⏳', name:'Order Received',     desc:'Hum aapka order process kar rahe hain' },
  { key:'confirmed',        icon:'✅', name:'Order Confirmed',     desc:'Aapka order confirm ho gaya!' },
  { key:'preparing',        icon:'👨‍🍳', name:'Taiyaar Ho Raha Hai', desc:'Kitchen mein aapka pizza ban raha hai 🍕' },
  { key:'out_for_delivery', icon:'🛵', name:'Rasta Pe Hai',        desc:'Delivery boy aapki taraf aa raha hai!' },
  { key:'delivered',        icon:'🎉', name:'Deliver Ho Gaya!',    desc:'Enjoy your pizza! 🍕' },
];

const STATUS_ORDER = ['pending','confirmed','preparing','out_for_delivery','delivered'];

const ETA = {
  pending:          '30–45 minutes',
  confirmed:        '25–40 minutes',
  preparing:        '15–30 minutes',
  out_for_delivery: '5–15 minutes',
  delivered:        'Delivered! 🎉',
  cancelled:        'Cancelled',
};

async function trackOrder() {
  const input = document.getElementById('orderInput').value.trim().toUpperCase();
  if (!input || input.length < 6) {
    showError('Sahi Order ID daalo (e.g. PA971143)');
    return;
  }

  const btn = document.getElementById('trackBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Tracking...';

  try {
    const res = await fetch(`/api/track/${input}`);
    const data = await res.json();

    if (!data.ok) {
      showError(data.msg || 'Order nahi mila! ID check karo.');
    } else {
      showOrder(data.order);
    }
  } catch {
    showError('Server se connect nahi ho paya. Dobara try karo.');
  }

  btn.disabled = false;
  btn.innerHTML = 'Track →';
}

function showError(msg) {
  const r = document.getElementById('result');
  r.className = 'result show';
  r.innerHTML = `<div class="error-box">❌ ${msg}</div>`;
}

function showOrder(order) {
  const r = document.getElementById('result');
  r.className = 'result show';

  const status = order.status;
  const isCancelled = status === 'cancelled';
  const currentIdx = STATUS_ORDER.indexOf(status);
  const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');

  // Status pill class
  const pillClass = `status-pill s-${status}`;
  const statusLabel = {
    pending: '⏳ Pending',
    confirmed: '✅ Confirmed',
    preparing: '👨‍🍳 Preparing',
    out_for_delivery: '🛵 On the Way',
    delivered: '🎉 Delivered',
    cancelled: '❌ Cancelled',
  }[status] || status;

  // Steps HTML
  const stepsHTML = isCancelled ? `
    <div class="step cancelled">
      <div class="step-dot">❌</div>
      <div class="step-info">
        <div class="step-name">Order Cancelled</div>
        <div class="step-desc">Aapka order cancel ho gaya. Help ke liye call karein.</div>
      </div>
    </div>` :
    STEPS.map((s, idx) => {
      let cls = 'inactive';
      if (idx < currentIdx) cls = 'done';
      else if (idx === currentIdx) cls = 'active';
      return `
        <div class="step ${cls}">
          <div class="step-dot">${cls === 'done' ? '✓' : s.icon}</div>
          <div class="step-info">
            <div class="step-name">${s.name}</div>
            <div class="step-desc">${s.desc}</div>
          </div>
        </div>`;
    }).join('');

  // ETA
  const etaHTML = !isCancelled ? `
    <div class="eta-box">
      <div class="eta-icon">⏱️</div>
      <div class="eta-text">
        <div class="eta-label">Estimated Time</div>
        <div class="eta-val">${ETA[status] || '—'}</div>
      </div>
    </div>` : '';

  // Date format
  const dt = new Date(order.created_at);
  const dateStr = dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
  const timeStr = dt.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});

  r.innerHTML = `
    <div class="order-card">
      <div class="order-card-header">
        <div>
          <div class="order-id-label">Order ID</div>
          <div class="order-id-val">#${order.order_id}</div>
        </div>
        <span class="${pillClass}">${statusLabel}</span>
      </div>

      <div class="progress-wrap">
        <div class="progress-title">Order Progress</div>
        <div class="steps">${stepsHTML}</div>
      </div>
    </div>

    ${etaHTML}

    <div class="order-card">
      <div class="order-details">
        <div class="detail-section">
          <div class="detail-title">Order Details</div>
          <div class="items-list">
            ${items.map(i => `
              <div class="item-row">
                <span class="item-name">${i.name}${i.size ? ' ('+i.size+')' : ''} × ${i.qty}</span>
                <span class="item-price">₹${i.price * i.qty}</span>
              </div>`).join('')}
          </div>
          <div class="total-row">
            <span>Total</span>
            <span class="total-val">₹${order.total_amount}</span>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-title">Delivery Info</div>
          <div class="detail-row"><span class="detail-key">Naam</span><span class="detail-val">${order.customer_name}</span></div>
          <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${order.customer_phone}</span></div>
          <div class="detail-row"><span class="detail-key">Address</span><span class="detail-val">${order.delivery_address}</span></div>
          <div class="detail-row"><span class="detail-key">Payment</span><span class="detail-val">${order.payment_method === 'cod' ? '💵 Cash on Delivery' : '📱 Online (UPI)'}</span></div>
          <div class="detail-row"><span class="detail-key">Order Time</span><span class="detail-val">${dateStr} · ${timeStr}</span></div>
        </div>
      </div>
    </div>

    <div class="help-box">
      <p>Koi problem hai? Humse baat karo!</p>
      <a href="tel:7453950529">📞 7453950529 / 7454850529</a>
    </div>
  `;
}

// Auto-track if order ID in URL
const urlParams = new URLSearchParams(window.location.search);
const urlOrder = urlParams.get('id');
if (urlOrder) {
  document.getElementById('orderInput').value = urlOrder;
  trackOrder();
}

// Enter key support
document.getElementById('orderInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') trackOrder();
});
</script>
</body>
</html>
